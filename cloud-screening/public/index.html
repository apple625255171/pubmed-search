<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 批量筛选流水线</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div>
      <h1>AI 批量筛选流水线</h1>
      <p>上传 PubMed / GEO 导出文件，云端调用 DeepSeek，导出 Excel 复核表。</p>
    </div>
    <button id="sampleButton" class="secondary" type="button">示例</button>
  </header>

  <main>
    <section class="panel controls">
      <h2>导入与标准</h2>
      <label for="taskType">筛选类型</label>
      <select id="taskType">
        <option value="pubmed">PubMed 文献</option>
        <option value="geo">GEO 数据集 / 样本</option>
      </select>

      <label for="fileInput">导入文件</label>
      <input id="fileInput" type="file" accept=".nbib,.ris,.csv,.tsv,.txt">
      <button id="parseButton" type="button">解析文件</button>

      <h2>PubMed 在线获取</h2>
      <label for="pmidInput">PMID 列表</label>
      <textarea id="pmidInput" placeholder="40790272&#10;40758331&#10;41230651"></textarea>
      <button id="fetchPmidsButton" class="secondary" type="button">按 PMID 获取摘要</button>

      <label for="pubmedQuery">PubMed 检索式</label>
      <textarea id="pubmedQuery" placeholder="可手动粘贴检索式，或先填写研究问题后点击生成检索式"></textarea>
      <label for="retmax">最多获取条数</label>
      <input id="retmax" type="number" min="1" max="10000" value="200">
      <div class="actions">
        <button id="generateQueryButton" class="secondary" type="button">生成检索式</button>
        <button id="searchPubMedButton" class="secondary" type="button">搜索并获取</button>
      </div>

      <label for="researchQuestion">研究问题</label>
      <textarea id="researchQuestion" placeholder="例如：胃癌根治术后并发症的危险因素"></textarea>
      <label for="includeCriteria">纳入标准</label>
      <textarea id="includeCriteria" placeholder="人类患者；目标疾病；目标干预或数据类型；相关结局；原始研究"></textarea>
      <label for="excludeCriteria">排除标准</label>
      <textarea id="excludeCriteria" placeholder="综述、病例报告、动物实验、非目标疾病、无相关结局"></textarea>

      <div class="checks">
        <label><input id="excludeReview" type="checkbox" checked> 排除综述</label>
        <label><input id="excludeAnimal" type="checkbox" checked> 排除动物实验</label>
      </div>

      <label for="batchSize">每批条数</label>
      <input id="batchSize" type="number" min="1" max="50" value="10">
      <div class="actions">
        <button id="testButton" class="secondary" type="button">测试服务器</button>
        <button id="screenButton" type="button">开始筛选</button>
      </div>
      <div class="progress"><span id="progressBar"></span></div>
      <p id="statusText" class="hint">等待导入文件。</p>
    </section>

    <section class="panel workspace">
      <nav class="tabs">
        <button class="tab active" data-tab="overview" type="button">总览</button>
        <button class="tab" data-tab="records" type="button">记录</button>
        <button class="tab" data-tab="results" type="button">结果</button>
        <button class="tab" data-tab="export" type="button">导出</button>
        <button class="tab" data-tab="log" type="button">日志</button>
      </nav>

      <section id="overview" class="tab-panel active">
        <div class="stats">
          <article><strong id="totalCount">0</strong><span>导入</span></article>
          <article><strong id="doneCount">0</strong><span>已筛</span></article>
          <article><strong id="includeCount">0</strong><span>纳入</span></article>
          <article><strong id="reviewCount">0</strong><span>待复核</span></article>
          <article><strong id="excludeCount">0</strong><span>排除</span></article>
        </div>
        <div class="note">
          <h2>云端版说明</h2>
          <p>DeepSeek API Key 保存在服务器环境变量中，手机网页不会看到 Key。适合部署到 Render、Railway 等支持 Node 的平台。</p>
        </div>
      </section>

      <section id="records" class="tab-panel">
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>标题/名称</th><th>年份/平台</th><th>摘要/描述</th></tr></thead>
            <tbody id="recordsBody"></tbody>
          </table>
        </div>
      </section>

      <section id="results" class="tab-panel">
        <div class="toolbar">
          <select id="decisionFilter">
            <option value="all">全部</option>
            <option value="纳入">纳入</option>
            <option value="待复核">待复核</option>
            <option value="排除">排除</option>
            <option value="未筛选">未筛选</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>判断</th><th>分数</th><th>ID</th><th>标题/名称</th><th>理由</th><th>排除原因</th><th>匹配要素</th></tr></thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </section>

      <section id="export" class="tab-panel export">
        <button id="exportExcelButton" type="button">导出 Excel</button>
        <button id="exportJsonButton" class="secondary" type="button">导出 JSON</button>
        <button id="exportPrismaButton" class="secondary" type="button">导出 PRISMA 统计</button>
      </section>

      <section id="log" class="tab-panel">
        <pre id="logBox"></pre>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
